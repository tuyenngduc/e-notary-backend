server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ENotarySystem

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:enotary_db}
    username: ${DB_USERNAME:tuyenngduc}
    password: ${DB_PASSWORD:tuyen123}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}


jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
  refreshExpiration: ${JWT_REFRESH_EXPIRATION}

logging:
  level:
    org.springframework.security: DEBUG
    
app:
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
  cors:
    # For local development + phone testing on LAN.
    # You can override with APP_CORS_ALLOWED_ORIGINS, e.g.
    #   http://localhost:5173,http://192.168.1.210:5173
    # Supports patterns (when using wildcards) via SecurityConfig/WebSocketConfig.
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://192.168.*:5173,http://192.168.*.*:5173,http://10.*:5173,http://10.*.*.*:5173,http://172.16.*:5173,http://172.17.*:5173,http://172.18.*:5173,http://172.19.*:5173,http://172.2*.*:5173,http://172.3*.*:5173}
  admin:
    email: ${ADMIN_EMAIL:admin@localhost}
    password: ${ADMIN_PASSWORD:DefaultAdmin@123}
  meeting:
    base-url: ${MEETING_BASE_URL:http://localhost:8080}
  mail:
    enabled: ${MAIL_ENABLED:true}
    from: ${MAIL_FROM:${MAIL_USERNAME:no-reply@enotary.local}}
