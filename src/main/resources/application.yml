server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ENotarySystem

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:enotary_db}
    username: ${DB_USERNAME:tuyenngduc}
    password: ${DB_PASSWORD:tuyen123}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}


jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
  refreshExpiration: ${JWT_REFRESH_EXPIRATION}

logging:
  level:
    org.springframework.security: DEBUG
    
app:
  admin:
    email: ${ADMIN_EMAIL:admin@localhost}
    password: ${ADMIN_PASSWORD:DefaultAdmin@123}
  meeting:
    base-url: ${MEETING_BASE_URL:http://localhost:8080}
  mail:
    enabled: ${MAIL_ENABLED:true}
